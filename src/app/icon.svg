<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background pill -->
  <rect width="32" height="32" rx="8" fill="#ead8ff" />

  <!-- ears -->
  <polygon points="7,12 3,2 13,9" fill="#f8c878" />
  <polygon points="25,12 29,2 19,9" fill="#f8c878" />
  <!-- inner ears -->
  <polygon points="7.5,11 5,4.5 12,8.5" fill="#f0a8c0" />
  <polygon points="24.5,11 27,4.5 20,8.5" fill="#f0a8c0" />

  <!-- face -->
  <circle cx="16" cy="19" r="11" fill="#f8c878" />

  <!-- eyes -->
  <ellipse cx="12" cy="18" rx="2.8" ry="2.8" fill="#3a2858" />
  <ellipse cx="20" cy="18" rx="2.8" ry="2.8" fill="#3a2858" />
  <!-- eye shine -->
  <circle cx="13.2" cy="16.8" r="1.1" fill="white" />
  <circle cx="21.2" cy="16.8" r="1.1" fill="white" />

  <!-- nose -->
  <ellipse cx="16" cy="22" rx="1.6" ry="1.1" fill="#f080a8" />

  <!-- blush -->
  <ellipse cx="9.5" cy="21" rx="3.2" ry="1.8" fill="#f0a8c8" opacity="0.55" />
  <ellipse cx="22.5" cy="21" rx="3.2" ry="1.8" fill="#f0a8c8" opacity="0.55" />

  <!-- tiny sparkle top-right -->
  <path
    d="M27 4 L27.6 6 L29.5 6 L28 7.2 L28.6 9.2 L27 8 L25.4 9.2 L26 7.2 L24.5 6 L26.4 6 Z"
    fill="#fde68a"
  />
</svg>
